micronaut:
  server:
    port: 8080
    cors:
      enabled: true
      configurations:
        local-ui:
          allowed-origins:
            - http://localhost:5173
            - http://localhost:8090
          allowed-methods:
            - GET
            - POST
            - OPTIONS
          allowed-headers:
            - Content-Type
            - Accept

policy:
  service-url: http://localhost:8082

starterkit:
  session:
    signing-secret: ${STARTERKIT_SESSION_SIGNING_SECRET:starterkit-local-session-secret}
