server {
  listen 8090;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  location = /config.json {
    return 404;
  }

  location = /readyz {
    default_type application/json;
    return 200 '{"status":"ready"}';
  }

  include /var/run/starterkit-ui-config/local-proxy.conf;

  location /assets/ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /favicon.ico {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
